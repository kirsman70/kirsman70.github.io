<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>

<div class="relative z-10 min-h-screen lg:flex">

  <div class="lg:hidden flex items-center justify-between px-4 py-3 glass border-x-0 border-t-0 sticky top-0 z-20">
    <a href="index.html" class="flex items-center gap-2">

  <main class="flex-1 min-w-0 px-4 sm:px-8 py-8 max-w-6xl w-full mx-auto">
    <div class="mb-7 flex items-start justify-between gap-4 flex-wrap">

      </div>

            <defs>
              <clipPath id="voyages-flame-clip">
                <path d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z"/>

                <stop offset="0%" style="stop-color: rgb(var(--accent-2-rgb))" />

            <g clip-path="url(#voyages-flame-clip)">
              <g id="voyages-flame-fill-group" transform="translate(0, 21)" class="flame-fill-group">
                <path d="M 0,0 Q 3,-1.5 6,0 T 12,0 T 18,0 T 24,0 T 30,0 T 36,0 L 36,24 L 0,24 Z" fill="url(#voyages-flame-gradient)" class="flame-wave" />
              </g>
            </g>
          </svg>
          <span class="font-display font-semibold text-lg" id="voyages-streak-count">6</span>
          <span class="text-zinc-500 text-xs" data-i18n="streak_days">hari beruntun</span>
        </div>
        <div class="glass rounded-xl px-4 py-2.5 flex items-center gap-2.5 shrink-0">
          <svg class="w-4 h-4 text-accent-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3.5l8.5 15h-17z" /></svg>
          <span class="font-display font-semibold text-lg" id="voyages-deltas-total">0</span>

      </div>
    </div>

    <!-- Filters + search -->
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-6 mb-8">
      <div class="flex flex-col sm:flex-row sm:items-end gap-6 w-full sm:w-[calc(50%-0.5rem)]">
        <div class="w-full sm:w-2/5 shrink-0">
          <label class="block text-xs font-medium text-zinc-400 mb-2 tracking-wide" data-i18n="voyages_filter_all">SUBJEK</label>

            <option value="math" selected>Matematika</option>

            <option value="biology" selected>Biologi</option>

            <span id="diff-label" class="text-accent-300 font-semibold cursor-pointer hover:brightness-125 transition" onclick="openDiffInput()" title="Klik untuk mengetik, mis. 3 atau 3-6">1 - 10</span>
            <input id="diff-input" type="text" inputmode="numeric" autocomplete="off"

        <div class="relative h-6 flex items-center w-full cursor-pointer" onmousedown="handleTrackClick(event)">

          <div class="absolute inset-0 flex justify-between items-center px-1 pointer-events-none">
            <div class="w-px h-2 bg-zinc-600"></div><div class="w-px h-2 bg-zinc-600"></div>
            <div class="w-px h-2 bg-zinc-600"></div><div class="w-px h-2 bg-zinc-600"></div>

          <!-- Inputs -->

      <button id="vm-submit-btn" onclick="submitVoyageAnswer()" class="px-5 py-2.5 rounded-lg font-semibold text-sm text-white bg-accent-gradient hover:brightness-110 shadow-glow-sm transition" data-i18n="voyages_submit">Kirim Jawaban</button>

</div>

<script>
  const VOYAGES = [
    {
      id: 'v1',

    {

      question: 'Sebuah benda bermassa $4 \\text{ kg}$ didorong dengan gaya konstan $20 \\text{ N}$ di atas bidang datar tanpa gesekan. Percepatan benda tersebut adalah ___ $\\text{m/s}^2$.',
      options: ['2', '4', '5', '8'],

    },
    {

    },
    {

      subject: 'coding',
      difficulty: 10,
      type: 'mc',
      question: 'Diberikan array integer yang sudah terurut menaik sepanjang $n$ ($1 \\le n \\le 10^6$). Untuk menemukan sepasang indeks $(i, j)$ sehingga $a[i] + a[j] = \\text{target}$ dengan kompleksitas waktu paling optimal, pendekatan mana yang tepat?',
      options: [
        'Brute force dua nested loop, $O(n^2)$',
        'Two pointer dari kedua ujung array, $O(n)$',
        'Rekursi penuh tanpa memoization',

      ],

    },
    {
      id: 'v5',
      title: 'Konsep Mol dan Stoikiometri',
      subject: 'chemistry',
      difficulty: 3,
      type: 'mc',
      question: 'Berapa jumlah mol yang terkandung dalam $22 \\text{ gram}$ $\\text{CO}_2$? ($\\text{Ar C} = 12$, $\\text{O} = 16$)',
      options: ['$0,25 \\text{ mol}$', '$0,5 \\text{ mol}$', '$1 \\text{ mol}$', '$2 \\text{ mol}$'],
      correctIndex: 1,
    },
    {
      id: 'v6',
      title: 'Laju Reaksi Kimia',
      subject: 'chemistry',
      difficulty: 5,
      type: 'dropdown',
      question: 'Menaikkan suhu reaksi sebesar $10^\\circ\\text{C}$ umumnya menyebabkan laju reaksi meningkat sekitar ___ kali lipat, sesuai aturan Van\'t Hoff.',
      options: ['1', '2', '5', '10'],
      correctIndex: 1,
    },
    {
      id: 'v7',
      title: 'Kesetimbangan Asam Basa OSN Kimia',
      subject: 'chemistry',
      difficulty: 10,
      type: 'essay',
      question: 'Jelaskan bagaimana larutan penyangga (buffer) mempertahankan pH-nya ketika ditambahkan sedikit asam kuat atau basa kuat. Sertakan contoh pasangan asam basa konjugasi.',
    },
    {
      id: 'v8',
      title: 'Struktur dan Fungsi Sel',
      subject: 'biology',
      difficulty: 2,
      type: 'mc',
      question: 'Organel sel yang berperan sebagai tempat utama respirasi seluler dan produksi $\\text{ATP}$ adalah …',
      options: ['Ribosom', 'Mitokondria', 'Badan Golgi', 'Lisosom'],
      correctIndex: 1,
    },
    {
      id: 'v9',
      title: 'Genetika Mendel',
      subject: 'biology',
      difficulty: 5,
      type: 'dropdown',
      question: 'Pada persilangan monohibrid dominan penuh ($Aa \\times Aa$), rasio fenotipe keturunan $F_2$ yang dihasilkan adalah $3 : \\text{\\_\\_\\_}$.',
      options: ['1', '2', '3', '4'],
      correctIndex: 0,
    },
    {
      id: 'v10',
      title: 'Fisiologi Tumbuhan OSN Biologi',
      subject: 'biology',
      difficulty: 10,
      type: 'essay',
      question: 'Jelaskan mekanisme membuka dan menutupnya stomata pada daun, serta kaitannya dengan pergerakan ion kalium ($\\text{K}^+$) pada sel penjaga (guard cell).',
    },
  ];

  const SUBJECT_META = {
    math:      { label: 'Matematika', icon: '∑' },
    physics:   { label: 'Fisika', icon: '⚛' },
    chemistry: { label: 'Kimia', icon: '⚗' },
    biology:   { label: 'Biologi', icon: '🧬' },
    coding:    { label: 'Koding', icon: '⌘' },
  };

  const TYPE_META = {
    mc: { i18n: 'voyages_type_mc', label: 'Pilihan Ganda' },
    dropdown: { i18n: 'voyages_type_dropdown', label: 'Dropdown' },
    essay: { i18n: 'voyages_type_essay', label: 'Esai' },
  };

  function deltaReward(difficulty) {
    return difficulty * 25 + (difficulty >= 10 ? 50 : 0);
  }

  function difficultyBadgeClass(d) {
    if (d >= 10) return 'diff-osn';
    if (d >= 7) return 'diff-hard';
    if (d >= 4) return 'diff-medium';
    return 'diff-easy';
  }

  function difficultyLabel(d) {
    return `${d}`;
  }

  const DIFF_STAR_SVG = '<svg class="w-3 h-3 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path d="M10 1.5l2.59 5.25 5.79.84-4.19 4.08.99 5.77L10 14.77l-5.18 2.67.99-5.77L1.62 7.59l5.79-.84L10 1.5z"/></svg>';

  function diffBadgeHtml(d) {
    return `${DIFF_STAR_SVG}<span>${difficultyLabel(d)}</span>`;
  }

  let currentSubjectFilter = new Set(['math', 'physics', 'chemistry', 'biology', 'coding']);
  let currentVoyageId = null;
  let selectedMcIndex = null;
  let diffMin = 1;
  let diffMax = 10;
  let voyageSearchQuery = '';

  function handleVoyageSearchChange() {
    voyageSearchQuery = document.getElementById('voyage-search').value.trim().toLowerCase();
    renderVoyageList();
  }

  function handleSubjectFilterChange() {
    const select = document.getElementById('filter-subject-select');
    currentSubjectFilter = new Set(Array.from(select.selectedOptions).map(o => o.value));
    renderVoyageList();
  }

  function spawnDiffStars() {
    const container = document.getElementById('diff-track').parentElement;
    const star = document.createElement('div');
    star.className = 'diff-star-particle w-3 h-3';
    star.innerHTML = DIFF_STAR_SVG;
    
    const tx = (Math.random() - 0.5) * 80 + 'px';
    const ty = -(20 + Math.random() * 40) + 'px';
    
    // Calculate random spin: between 180 and 540 degrees, random direction (1 or -1)
    const rotEnd = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 360) + 'deg';
    
    star.style.setProperty('--tx', tx);
    star.style.setProperty('--ty', ty);
    star.style.setProperty('--rot-end', rotEnd);
    
    // Pick a random color from the active theme's accent palette
    const colorVars = ['--accent-rgb', '--accent-light-rgb', '--accent-2-rgb', '--accent-lighter-rgb'];
    const randomColor = colorVars[Math.floor(Math.random() * colorVars.length)];
    star.style.color = `rgb(var(${randomColor}))`;
    
    // Calculate the active track zone from input values directly
    const minVal = parseInt(document.getElementById('diff-min').value, 10);
    const maxVal = parseInt(document.getElementById('diff-max').value, 10);
    const trueMin = Math.min(minVal, maxVal);
    const trueMax = Math.max(minVal, maxVal);
    
    const leftPercent = ((trueMin - 1) / 9) * 100;
    const widthPercent = ((trueMax - trueMin) / 9) * 100;
    const randomPos = leftPercent + (Math.random() * widthPercent);
    
    star.style.left = `${randomPos}%`;
    star.style.top = '50%';
    
    container.appendChild(star);
    setTimeout(() => star.remove(), 1200);
  }

  function handleTrackClick(e) {
    if (e.target.tagName.toLowerCase() === 'input') return;

    const rect = e.currentTarget.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    const targetVal = Math.max(1, Math.min(10, Math.round((percent * 9) + 1)));

    const minInput = document.getElementById('diff-min');
    const maxInput = document.getElementById('diff-max');
    const currentMin = parseInt(minInput.value, 10);
    const currentMax = parseInt(maxInput.value, 10);

    if (Math.abs(targetVal - currentMin) < Math.abs(targetVal - currentMax)) {
      minInput.value = targetVal;
    } else {
      maxInput.value = targetVal;
    }
    
    updateDiffFilter();
  }

  function updateDiffFilter(skipStars = false) {
    if (!skipStars && Math.random() > 0.4) spawnDiffStars();
    
    let minVal = parseInt(document.getElementById('diff-min').value, 10);
    let maxVal = parseInt(document.getElementById('diff-max').value, 10);
    
    if (minVal > maxVal) {
      const tmp = minVal;
      minVal = maxVal;
      maxVal = tmp;
    }
    
    diffMin = minVal;
    diffMax = maxVal;
    
    document.getElementById('diff-label').textContent = diffMin + ' - ' + diffMax;
    
    const track = document.getElementById('diff-track');
    const leftPercent = ((minVal - 1) / 9) * 100;
    const rightPercent = 100 - (((maxVal - 1) / 9) * 100);
    
    // Adjust visual bar positioning to account for thumb width mapping
    track.style.left = 'calc(' + leftPercent + '% + ' + (8 - (leftPercent * 0.16)) + 'px)';
    track.style.right = 'calc(' + rightPercent + '% + ' + (8 - (rightPercent * 0.16)) + 'px)';
    
    renderVoyageList();
  }

  function openDiffInput() {
    const label = document.getElementById('diff-label');
    const input = document.getElementById('diff-input');
    input.value = diffMin === diffMax ? `${diffMin}` : `${diffMin}-${diffMax}`;
    label.classList.add('hidden');
    input.classList.remove('hidden');
    input.focus();
    input.select();
  }

  function handleDiffInputKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur ? input.blur() : document.getElementById('diff-input').blur(); }
    if (e.key === 'Escape') { e.preventDefault(); document.getElementById('diff-input').value = ''; cancelDiffInput(); }
  }

  function cancelDiffInput() {
    // diffMin/diffMax already reflect the last valid value typed (or the
    // range from before editing started, if nothing valid was typed) —
    // so just hiding the input naturally "reverts" an emptied field.
    document.getElementById('diff-input').classList.add('hidden');
    document.getElementById('diff-label').classList.remove('hidden');
  }

  function shakeDiffInput() {
    const input = document.getElementById('diff-input');
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);
  }

  function liveDiffInput() {
    const input = document.getElementById('diff-input');

    // Block anything that isn't a digit or a dash as it's typed, and
    // collapse any extra dashes down to one.
    let cleaned = input.value.replace(/[^0-9-]/g, '');
    const firstDash = cleaned.indexOf('-');
    if (firstDash !== -1) {
      cleaned = cleaned.slice(0, firstDash + 1) + cleaned.slice(firstDash + 1).replace(/-/g, '');
    }
    if (cleaned !== input.value) input.value = cleaned;

    if (cleaned === '') return; // leave diffMin/diffMax as they were

    const match = cleaned.match(/^(\d{1,2})-(\d{1,2})$|^(\d{1,2})-?$/);
    if (!match) { shakeDiffInput(); return; }

    if (match[3] !== undefined) {
      if (cleaned.endsWith('-')) return; // still typing the second number
      const n = parseInt(match[3], 10);
      if (n >= 1 && n <= 10) {
        document.getElementById('diff-min').value = n;
        document.getElementById('diff-max').value = n;
        updateDiffFilter();
      } else {
        shakeDiffInput();
      }
      return;
    }

    const a = parseInt(match[1], 10);
    const b = parseInt(match[2], 10);
    if (a >= 1 && a <= 10 && b >= 1 && b <= 10) {
      document.getElementById('diff-min').value = Math.min(a, b);
      document.getElementById('diff-max').value = Math.max(a, b);
      updateDiffFilter();
    } else {
      shakeDiffInput();
    }
  }

  function renderVoyageList() {
    const lang = localStorage.getItem('kir_lang') || 'id';
    const filtered = VOYAGES.filter(v => 
      currentSubjectFilter.has(v.subject) &&
      (v.difficulty >= diffMin && v.difficulty <= diffMax) &&
      (voyageSearchQuery === '' || v.title.toLowerCase().includes(voyageSearchQuery) || v.question.toLowerCase().includes(voyageSearchQuery))
    );
    document.getElementById('voyage-list').innerHTML = filtered.map((v, i) => {
      const meta = SUBJECT_META[v.subject];
      const type = TYPE_META[v.type];
      const done = kirVoyageCompletion(v.id);
      const reward = deltaReward(v.difficulty);
      return `
        <button onclick="openVoyageModal('${v.id}')" style="animation-delay: ${i * 45}ms" class="glass rounded-2xl p-5 text-left voyage-card ${done ? 'completed' : ''} relative overflow-hidden">
          ${v.difficulty >= 10 ? '<div class="glow-blob w-32 h-32 -top-8 -right-8" style="background: rgba(236,72,153,0.18);"></div>' : ''}
          <div class="relative">
            <div class="flex items-center gap-2 flex-wrap mb-3">
              <span class="subject-badge">${meta.icon} ${meta.label}</span>
              <span class="diff-badge ${difficultyBadgeClass(v.difficulty)}">${diffBadgeHtml(v.difficulty)}</span>
            </div>
            <h3 class="font-display font-semibold text-base mb-1.5">${v.title}</h3>
            <p class="text-zinc-500 text-xs mb-4 line-clamp-2">${v.question}</p>
            <div class="flex items-center justify-between">
              <span class="type-pill">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                <span data-i18n="${type.i18n}">${type.label}</span>
              </span>
              ${done
                ? `<span class="text-xs font-medium px-2.5 py-1 rounded-full bg-accent-10 text-accent-200 border border-accent-20 flex items-center gap-1"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg> +${done.deltas}</span>`
                : `<span class="text-xs font-semibold text-accent-300 flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3.5l8.5 15h-17z" /></svg>+${reward}</span>`
              }
            </div>
          </div>
        </button>`;
    }).join('');
    kirApplyTranslations();
    
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise();
    }
  }

  function refreshDeltasHeader() {
    document.getElementById('voyages-deltas-total').textContent = kirDeltasTotal().toLocaleString('id-ID');
  }

  function openVoyageModal(id) {
    const v = VOYAGES.find(x => x.id === id);
    if (!v) return;
    currentVoyageId = id;
    selectedMcIndex = null;
    const lang = localStorage.getItem('kir_lang') || 'id';
    const meta = SUBJECT_META[v.subject];
    const type = TYPE_META[v.type];

    document.getElementById('vm-title').textContent = v.title;
    document.getElementById('vm-subject-badge').textContent = `${meta.icon} ${meta.label}`;
    const diffBadge = document.getElementById('vm-diff-badge');
    diffBadge.innerHTML = diffBadgeHtml(v.difficulty);
    diffBadge.className = 'diff-badge ' + difficultyBadgeClass(v.difficulty);
    const typePill = document.getElementById('vm-type-pill');
    typePill.innerHTML = `<svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>` + I18N[lang][type.i18n];
    document.getElementById('vm-question').textContent = v.question;
    document.getElementById('vm-reward-amount').textContent = deltaReward(v.difficulty);

    document.getElementById('vm-mc-wrap').classList.toggle('hidden', v.type !== 'mc');
    document.getElementById('vm-dropdown-wrap').classList.toggle('hidden', v.type !== 'dropdown');
    document.getElementById('vm-essay-wrap').classList.toggle('hidden', v.type !== 'essay');

    if (v.type === 'mc') {
      document.getElementById('vm-mc-options').innerHTML = v.options.map((opt, i) => `
        <div class="voyage-option" id="vm-opt-${i}" onclick="selectMcOption(${i})">
          <span class="voyage-option-dot"></span>
          <span>${opt}</span>
        </div>`).join('');
    }
    if (v.type === 'dropdown') {
      const select = document.getElementById('vm-dropdown-select');
      select.innerHTML = `<option value="" disabled selected>${I18N[lang].voyages_pick_placeholder}</option>` +
        v.options.map((opt, i) => `<option value="${i}">${opt}</option>`).join('');
      kirRefreshCustomSelect('vm-dropdown-select');
    }
    if (v.type === 'essay') {
      document.getElementById('vm-essay-textarea').value = '';
    }

    const feedback = document.getElementById('vm-feedback');
    feedback.classList.add('hidden');
    feedback.textContent = '';

    const submitBtn = document.getElementById('vm-submit-btn');
    const done = kirVoyageCompletion(v.id);
    submitBtn.disabled = false;
    submitBtn.textContent = I18N[lang].voyages_submit;
    submitBtn.removeAttribute('data-i18n');

    if (done && v.type !== 'essay') {
      // Already solved before — show state, still let them review but no re-earning.
      feedback.classList.remove('hidden');
      feedback.className = 'text-sm font-medium rounded-lg px-4 py-3 mb-4 bg-accent-10 text-accent-200 border border-accent-20';
      feedback.textContent = I18N[lang].voyages_already_done;
    }

    document.getElementById('voyage-modal').classList.remove('hidden');
    kirRenderCommentSection('voyage-comments-root', 'voyage', id);
    kirApplyTranslations();
    
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise();
    }
  }

  function closeVoyageModal() {
    document.getElementById('voyage-modal').classList.add('hidden');
    currentVoyageId = null;
  }

  function selectMcOption(i) {
    selectedMcIndex = i;
    document.querySelectorAll('#vm-mc-options .voyage-option').forEach((el, idx) => {
      el.classList.toggle('selected', idx === i);
    });
  }

  function showDeltasToast(amount) {
    const toast = document.getElementById('deltas-toast');
    document.getElementById('deltas-toast-text').textContent = `+${amount} deltas!`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function submitVoyageAnswer() {
    const v = VOYAGES.find(x => x.id === currentVoyageId);
    if (!v) return;
    const lang = localStorage.getItem('kir_lang') || 'id';
    const feedback = document.getElementById('vm-feedback');
    const reward = deltaReward(v.difficulty);
    const alreadyDone = kirVoyageCompletion(v.id);

    if (v.type === 'essay') {
      const text = document.getElementById('vm-essay-textarea').value.trim();
      if (!text) return;
      feedback.classList.remove('hidden');
      feedback.className = 'text-sm font-medium rounded-lg px-4 py-3 mb-4 bg-accent-15 text-accent-300 border border-accent-30';
      feedback.textContent = I18N[lang].voyages_essay_sent;
      if (!alreadyDone) {
        kirMarkVoyageCompleted(v.id, 0);
        renderVoyageList();
      }
      document.getElementById('vm-submit-btn').disabled = true;
      return;
    }

    let isCorrect = false;
    if (v.type === 'mc') {
      if (selectedMcIndex === null) return;
      isCorrect = selectedMcIndex === v.correctIndex;
      document.querySelectorAll('#vm-mc-options .voyage-option').forEach((el, idx) => {
        el.classList.remove('selected');
        if (idx === v.correctIndex) el.classList.add('correct');
        else if (idx === selectedMcIndex) el.classList.add('incorrect');
      });
    } else if (v.type === 'dropdown') {
      const select = document.getElementById('vm-dropdown-select');
      if (select.value === '') return;
      isCorrect = parseInt(select.value, 10) === v.correctIndex;
    }

    feedback.classList.remove('hidden');
    if (isCorrect) {
      feedback.className = 'text-sm font-medium rounded-lg px-4 py-3 mb-4 bg-accent-10 text-accent-200 border border-accent-20';
      feedback.textContent = I18N[lang].voyages_correct + (alreadyDone ? '' : ` +${reward} ${I18N[lang].voyages_earned}`);
      if (!alreadyDone) {
        kirMarkVoyageCompleted(v.id, reward);
        kirAddDeltas(reward);
        refreshDeltasHeader();
        showDeltasToast(reward);
        renderVoyageList();
      }
      document.getElementById('vm-submit-btn').disabled = true;
    } else {
      feedback.className = 'text-sm font-medium rounded-lg px-4 py-3 mb-4 bg-white/5 text-zinc-400 border border-white/10';
      feedback.textContent = I18N[lang].voyages_incorrect;
    }
  }

  const VOYAGES_STREAK_DAYS = 6;
  const VOYAGES_STREAK_FILL_GOAL = 10; // days for a visually "full" flame — cosmetic only, matches dashboard

  function renderVoyagesStreak() {
    document.getElementById('voyages-streak-count').textContent = VOYAGES_STREAK_DAYS;
    const pct = Math.min(VOYAGES_STREAK_DAYS / VOYAGES_STREAK_FILL_GOAL, 1);
    const flameTop = 2, flameBottom = 21; // approx vertical bounds of the flame path
    const currentY = flameBottom - ((flameBottom - flameTop) * pct);
    document.getElementById('voyages-flame-fill-group').setAttribute('transform', `translate(0, ${currentY})`);
  }

  document.getElementById('filter-subject-select').addEventListener('change', handleSubjectFilterChange);
  kirRefreshMultiSelect('filter-subject-select');
  updateDiffFilter(true);
  refreshDeltasHeader();
  renderVoyagesStreak();
  kirInjectSidebar('voyages');
</script>
</body>
</html>
