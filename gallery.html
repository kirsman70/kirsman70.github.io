<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galeri</title>

<script src="js/auth.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>
<div class="glow-blob w-[400px] h-[400px] bg-accent-10 top-1/3 -right-32"></div>
<div class="glow-blob w-[350px] h-[350px] bg-accent-10 bottom-0 left-1/4"></div>

<!-- Top bar (shared public nav) -->
<header class="relative z-10 max-w-6xl mx-auto px-4 sm:px-8 py-6 flex items-center justify-between gap-4">
  <a href="index.html" class="flex items-center gap-2.5 shrink-0">
    <div class="w-9 h-9 rounded-lg bg-accent-gradient flex items-center justify-center font-display font-bold shadow-glow-sm">O</div>
    <div>
      <div class="flex items-center gap-1.5">
        <span class="font-display font-semibold text-lg block leading-none tracking-wider">orbit.io</span>
        <svg class="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4" stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="12" cy="12" rx="10" ry="3" transform="rotate(-25 12 12)" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="text-[10px] text-zinc-500 tracking-wide block mt-1" data-i18n="kir_long">Karya Ilmiah Remaja</span>
    </div>
  </a>
  <nav class="hidden md:flex items-center gap-7">
    <a href="index.html" class="public-nav-link" data-i18n="nav_beranda">Beranda</a>
    <a href="gallery.html" class="public-nav-link active" data-i18n="nav_galeri">Galeri</a>
    <a href="program-kerja.html" class="public-nav-link" data-i18n="nav_proker">Program Kerja</a>
  </nav>
  <nav class="flex items-center gap-3 shrink-0">
    <a href="auth.html" id="nav-auth-link" class="text-sm text-zinc-300 hover:text-white transition px-4 py-2" data-i18n="idx_login">Masuk</a>
    <a href="auth.html" id="nav-cta-link" class="text-sm font-semibold px-4 py-2 rounded-lg bg-accent-gradient text-white shadow-glow-sm hover:brightness-110 transition" data-i18n="idx_register">Daftar</a>
  </nav>
</header>

<main class="relative z-10 max-w-6xl mx-auto px-4 sm:px-8 pb-24">
  <div class="mb-8 max-w-2xl">
    <p class="text-accent-300 text-xs font-medium tracking-widest uppercase mb-3" data-i18n="nav_galeri">Galeri</p>
    <h1 class="font-display text-3xl sm:text-4xl font-semibold tracking-tight mb-3" data-i18n="gallery_title">Galeri</h1>
    <p class="text-zinc-500 text-sm sm:text-base" data-i18n="gallery_desc">
      Dokumentasi kegiatan klub, disusun jadi folder seperti berkas di komputer kamu. Klik folder untuk membuka, atau tombol ".." untuk kembali.
    </p>
  </div>

  <div class="finder-window max-w-4xl">
    <div class="finder-titlebar">
      <span class="finder-dot"></span><span class="finder-dot"></span><span class="finder-dot"></span>
      <span class="text-xs text-zinc-500 ml-2 font-medium">Galeri KIR</span>
    </div>
    <div id="finder-pathbar" class="finder-pathbar"></div>
    <div id="finder-grid" class="finder-grid"></div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox-overlay" class="modal-overlay hidden" onclick="if(event.target===this) closeLightbox()">
  <div class="modal-card p-5 max-w-lg">
    <div class="flex items-center justify-between mb-3">
      <span id="lightbox-count" class="text-xs text-zinc-500"></span>
      <button onclick="closeLightbox()" class="text-zinc-500 hover:text-zinc-300 p-1">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <div class="relative">
      <div id="lightbox-photo" class="lightbox-photo"></div>
      <button onclick="lightboxNav(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
      </button>
      <button onclick="lightboxNav(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
      </button>
    </div>
    <p id="lightbox-name" class="text-zinc-400 text-sm mt-3 text-center"></p>
  </div>
</div>

<script src="js/gallery.js"></script>
<script>
  kirApplyTranslations();
  if (kirIsLoggedIn()) {
    const authLink = document.getElementById('nav-auth-link');
    const ctaLink = document.getElementById('nav-cta-link');
    const lang = localStorage.getItem('kir_lang') || 'id';
    authLink.textContent = I18N[lang].idx_dashboard;
    authLink.removeAttribute('data-i18n');
    authLink.href = 'dashboard.html';
    ctaLink.textContent = I18N[lang].idx_open_dashboard;
    ctaLink.removeAttribute('data-i18n');
    ctaLink.href = 'dashboard.html';
  }
  galleryInitFromQuery();
</script>
</body>
</html>
