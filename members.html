<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anggota</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script>kirRequireAuth();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" href="css/style.css">

<style>
  #chart-viewport {
    cursor: grab;
    touch-action: none;
    user-select: none;
    background-image: radial-gradient(circle, rgba(148,163,184,0.16) 1px, transparent 1.5px);
    background-size: 26px 26px;
    background-position: 0px 0px;
  }
  #chart-viewport.dragging { cursor: grabbing; }

  /* The faint slate dots read fine on the near-black dark bg, but
     disappear against the near-opaque white .glass surface in
     light mode, so contrast is bumped and the dot color darkened there. */
  [data-theme="light"] #chart-viewport {
    background-image: radial-gradient(circle, rgba(15,23,42,0.22) 1.3px, transparent 1.8px);
  }

  /* Cards get a slightly less translucent backing than the default
     .glass so the viewport's dot-grid texture doesn't visibly bleed
     through the card surface; it should stay confined to the empty
     space behind/around the chart, not show through the UI. Kept
     subtle so cards still read as "glass", not solid black. */
  #chart-viewport .org-card {
    background: rgba(24, 24, 27, 0.4);
  }
  [data-theme="light"] #chart-viewport .org-card {
    background: rgba(255, 255, 255, 0.65);
  }

  #chart-canvas {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .org-row {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: flex-start;
    gap: 1.5rem;
  }

  .org-card {
    width: 12rem;
    flex-shrink: 0;
  }

  /* Members block: rendered as an explicit stack of rows capped at
     5 cards each (see chunkArray in the script below) rather than
     relying on CSS flex-wrap max-width math, which is fragile to
     border/box-sizing rounding. */
  .org-row-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .org-line {
    fill: none;
    stroke: rgba(148, 163, 184, 0.4);
    stroke-width: 1.5;
  }

  .chart-ctrl-btn {
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 0.6rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: inherit;
  }
  .chart-ctrl-btn:hover { background: rgba(128,128,128,0.12); }
  .chart-ctrl-btn:active { transform: scale(0.94); }

  .chart-hint {
    pointer-events: none;
    user-select: none;
  }
</style>
</head>

<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>
<div class="glow-blob w-[400px] h-[400px] bg-accent-10 top-1/3 -right-32"></div>
<div class="glow-blob w-[350px] h-[350px] bg-accent-10 bottom-0 left-1/4"></div>

<div class="relative z-10 min-h-screen lg:flex">

  <div class="lg:hidden flex items-center justify-between px-4 py-3 glass border-x-0 border-t-0 sticky top-0 z-20">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-accent-gradient flex items-center justify-center font-display font-bold text-sm">K</div>
      <span class="font-display font-semibold">KIR</span>
    </a>
    <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="text-zinc-300 p-2 -mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div id="sidebar-root"></div>

  <main class="flex-1 min-w-0 px-4 sm:px-8 py-8 max-w-6xl w-full mx-auto">
    <div class="mb-7 flex items-center justify-between">
      <div>
        <h1 class="font-display text-2xl sm:text-3xl font-semibold tracking-tight" data-i18n="anggota">Anggota</h1>
        <p class="text-zinc-500 text-sm mt-1" data-i18n="members_desc">Semua orang yang tergabung di KIR.</p>
      </div>
      <div class="hidden sm:flex items-center gap-2 text-xs">
        <span class="px-3 py-1 rounded-full badge-robotik">Robotik</span>
        <span class="px-3 py-1 rounded-full badge-sains">Sains</span>
      </div>
    </div>

    <!-- Pannable/zoomable org chart -->
    <div id="chart-viewport" class="glass rounded-2xl relative overflow-hidden" style="height: 66vh; min-height: 460px;">

      <div class="absolute top-3 right-3 z-20 flex flex-col gap-1.5">
        <button onclick="chartZoom(1.15)" class="chart-ctrl-btn" title="Perbesar">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
        <button onclick="chartZoom(1/1.15)" class="chart-ctrl-btn" title="Perkecil">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h15" /></svg>
        </button>
        <button onclick="chartResetView()" class="chart-ctrl-btn" title="Reset tampilan">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114-5M20 15a8 8 0 01-14 5" /></svg>
        </button>
      </div>

      <p class="chart-hint absolute bottom-3 left-4 z-20 text-[11px] text-zinc-500" data-i18n="members_drag_hint">Geser untuk menjelajah struktur</p>

      <div id="chart-canvas">
        <svg id="chart-lines" style="position:absolute; top:0; left:0; overflow:visible;"></svg>
        <div id="member-list" class="flex flex-col items-center px-16 py-16"><!-- filled by script --></div>
      </div>
    </div>
  </main>
</div>

<script>
  let MEMBERS = [];

  async function fetchMembersFromDatabase() {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('*')
      .order('name', { ascending: true });
      
    if (error) {
      console.error('Error fetching members:', error);
      return;
    }

    const youName = localStorage.getItem('kir_user_name') || 'Anggota';

    MEMBERS = data.map(p => ({
      name: p.name,
      role: p.role || 'Anggota',
      cabang: p.cabang,
      isYou: p.name === youName
    }));

    renderMembers();
    
    // Wait a frame so layout has settled (fonts, DOM) before measuring connectors.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        drawConnectors();
        centerCanvas();
      });
    });
  }

  function cabangBadges(cabang) {
    if (cabang === 'both') {
      return `<span class="text-[10px] px-2 py-0.5 rounded-full badge-robotik">Robotik</span><span class="text-[10px] px-2 py-0.5 rounded-full badge-sains">Sains</span>`;
    }
    const cls = cabang === 'sains' ? 'badge-sains' : 'badge-robotik';
    const label = cabang === 'sains' ? 'Sains' : 'Robotik';
    return `<span class="text-[10px] px-2 py-0.5 rounded-full ${cls}">${label}</span>`;
  }

  function getRoleI18n(role) {
    const map = { 'Ketua Ekstrakurikuler': 'role_ketua', 'Wakil Ketua': 'role_wakil', 'Sekretaris': 'role_sekretaris', 'Bendahara': 'role_bendahara', 'PJ Robotika': 'role_pj_robotika', 'PJ Sains': 'role_pj_sains', 'Anggota': 'role_anggota' };
    return map[role] || null;
  }

  function buildCard(m) {
    const i18nKey = getRoleI18n(m.role);
    const i18nAttr = i18nKey ? `data-i18n="${i18nKey}"` : '';
    return `
      <div class="org-card glass rounded-xl p-4 flex flex-col items-center gap-2 text-center relative z-10 shadow-lg">
        <div class="w-12 h-12 rounded-full bg-accent-gradient flex items-center justify-center font-display font-semibold shrink-0 shadow-glow-sm">
          ${m.name.charAt(0).toUpperCase()}
        </div>
        <div class="min-w-0 w-full">
          <p class="font-medium text-zinc-100 text-sm truncate">${m.name}${m.isYou ? ' <span class="text-accent-300" data-i18n="you">(kamu)</span>' : ''}</p>
          <p class="text-zinc-500 text-[11px] mt-0.5" ${i18nAttr}>${m.role}</p>
        </div>
        <div class="flex items-center justify-center gap-1 mt-1">${cabangBadges(m.cabang)}</div>
      </div>`;
  }

  function chunkArray(arr, size) {
    const out = [];
    for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
    return out;
  }

  function renderMembers() {
    const all = MEMBERS;

    const ketua = all.filter(m => m.role.startsWith('Ketua Ekstrakurikuler'));
    const wakil = all.filter(m => m.role.startsWith('Wakil Ketua'));
    const inti = all.filter(m => m.role.startsWith('Sekretaris') || m.role.startsWith('Bendahara') || m.role.startsWith('PJ'));
    
    const placed = new Set([...ketua, ...wakil, ...inti]);
    const anggota = all.filter(m => !placed.has(m));

    const anggotaRows = chunkArray(anggota, 5)
      .map(row => `<div class="org-row">${row.map(buildCard).join('')}</div>`)
      .join('');

    document.getElementById('member-list').innerHTML = `
      <div class="org-row" data-row="1">
        ${ketua.map(buildCard).join('')}
        ${wakil.map(buildCard).join('')}
      </div>

      <div class="org-row mt-24" data-row="2">
        ${inti.map(buildCard).join('')}
      </div>

      <div class="org-row-group mt-24" data-row="3">
        ${anggotaRows}
      </div>
    `;
    kirApplyTranslations();
  }

  /* ---------- Connector lines ----------
     Computed from real layout (offsetLeft/offsetTop relative to
     #chart-canvas), so they stay correctly attached to each card
     regardless of how many people are in a row or how it wraps,
     and independent of the current pan/zoom transform. */
  function cardRect(el) {
    return {
      left: el.offsetLeft,
      right: el.offsetLeft + el.offsetWidth,
      top: el.offsetTop,
      bottom: el.offsetTop + el.offsetHeight,
      centerX: el.offsetLeft + el.offsetWidth / 2,
    };
  }

  function drawConnectors() {
    const canvas = document.getElementById('chart-canvas');
    const svg = document.getElementById('chart-lines');

    const rows = [1, 2, 3].map(n =>
      Array.from(document.querySelectorAll(`[data-row="${n}"] .org-card`))
    );

    let paths = '';

    for (let i = 0; i < rows.length - 1; i++) {
      const parents = rows[i];
      const children = rows[i + 1];
      if (!parents.length || !children.length) continue;

      const parentRects = parents.map(cardRect);
      const childRects = children.map(cardRect);

      const parentCenterX = (Math.min(...parentRects.map(r => r.left)) + Math.max(...parentRects.map(r => r.right))) / 2;
      const parentBottomY = Math.max(...parentRects.map(r => r.bottom));
      const childTopY = Math.min(...childRects.map(r => r.top));
      const busY = parentBottomY + (childTopY - parentBottomY) / 2;

      // If the children wrapped onto multiple visual lines (e.g. a
      // big members block), only connect to the top-most line with
      // proper per-card drops, same as any other level. The
      // overflow lines below are the same tier, just wrapped for
      // space, so they don't need their own branch.
      const topRow = childRects.filter(r => Math.abs(r.top - childTopY) < 1);

      // trunk from parent group down to the bus
      paths += `<path class="org-line" d="M ${parentCenterX} ${parentBottomY} L ${parentCenterX} ${busY}" />`;

      // horizontal bus, spanning every child-in-top-row center plus the
      // trunk point, so the trunk always lands exactly on the bus line
      const childXs = topRow.map(r => r.centerX);
      const busMinX = Math.min(parentCenterX, ...childXs);
      const busMaxX = Math.max(parentCenterX, ...childXs);
      if (busMaxX - busMinX > 0.5) {
        paths += `<path class="org-line" d="M ${busMinX} ${busY} L ${busMaxX} ${busY}" />`;
      }

      // drops from bus down to each top-row child's top
      topRow.forEach(r => {
        paths += `<path class="org-line" d="M ${r.centerX} ${busY} L ${r.centerX} ${r.top}" />`;
      });
    }

    svg.innerHTML = paths;
    svg.setAttribute('width', canvas.offsetWidth);
    svg.setAttribute('height', canvas.offsetHeight);
  }

  /* ---------- Pan & zoom ---------- */
  let panX = 0, panY = 0, scale = 1;
  let isDragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
  let didDrag = false;

  function applyTransform() {
    document.getElementById('chart-canvas').style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    const viewport = document.getElementById('chart-viewport');
    viewport.style.backgroundPosition = `${panX}px ${panY}px`;
    viewport.style.backgroundSize = `${26 * scale}px ${26 * scale}px`;
  }

  function chartZoom(factor) {
    scale = Math.min(1.6, Math.max(0.45, scale * factor));
    applyTransform();
  }

  function centerCanvas() {
    const viewport = document.getElementById('chart-viewport');
    const canvas = document.getElementById('chart-canvas');
    scale = 1;
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
    panX = Math.max(16, (vw - cw) / 2);
    panY = Math.max(16, (vh - ch) / 2);
    applyTransform();
  }

  function chartResetView() {
    centerCanvas();
  }

  function pointFromEvent(e) {
    return e.touches && e.touches.length ? e.touches[0] : e;
  }

  function chartPointerDown(e) {
    if (e.target.closest('.chart-ctrl-btn')) return;
    isDragging = true;
    didDrag = false;
    const p = pointFromEvent(e);
    dragStartX = p.clientX;
    dragStartY = p.clientY;
    panStartX = panX;
    panStartY = panY;
    document.getElementById('chart-viewport').classList.add('dragging');
  }

  function chartPointerMove(e) {
    if (!isDragging) return;
    const p = pointFromEvent(e);
    const dx = p.clientX - dragStartX;
    const dy = p.clientY - dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    panX = panStartX + dx;
    panY = panStartY + dy;
    applyTransform();
    if (e.cancelable) e.preventDefault();
  }

  function chartPointerUp() {
    isDragging = false;
    document.getElementById('chart-viewport').classList.remove('dragging');
  }

  function initChartInteractions() {
    const viewport = document.getElementById('chart-viewport');
    viewport.addEventListener('mousedown', chartPointerDown);
    window.addEventListener('mousemove', chartPointerMove);
    window.addEventListener('mouseup', chartPointerUp);

    viewport.addEventListener('touchstart', chartPointerDown, { passive: true });
    viewport.addEventListener('touchmove', chartPointerMove, { passive: false });
    viewport.addEventListener('touchend', chartPointerUp);

    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      chartZoom(e.deltaY < 0 ? 1.08 : 1 / 1.08);
    }, { passive: false });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        drawConnectors();
        centerCanvas();
      }, 150);
    });
  }

  initChartInteractions();
  kirInjectSidebar('members');
  fetchMembersFromDatabase();
</script>
<script src="js/router.js"></script>
</body>
</html>
