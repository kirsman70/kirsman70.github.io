<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anggota</title>

<script src="js/auth.js"></script>
<script>kirRequireAuth();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>
<div class="glow-blob w-[400px] h-[400px] bg-accent-10 top-1/3 -right-32"></div>
<div class="glow-blob w-[350px] h-[350px] bg-accent-10 bottom-0 left-1/4"></div>

<div class="relative z-10 min-h-screen lg:flex">

  <div class="lg:hidden flex items-center justify-between px-4 py-3 glass border-x-0 border-t-0 sticky top-0 z-20">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-accent-gradient flex items-center justify-center font-display font-bold text-sm">K</div>
      <span class="font-display font-semibold">KIR</span>
    </a>
    <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="text-zinc-300 p-2 -mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div id="sidebar-root"></div>

  <main class="flex-1 min-w-0 px-4 sm:px-8 py-8 max-w-6xl w-full mx-auto">
    <div class="mb-7 flex items-center justify-between">
      <div>
        <h1 class="font-display text-2xl sm:text-3xl font-semibold tracking-tight" data-i18n="anggota">Anggota</h1>
        <p class="text-zinc-500 text-sm mt-1" data-i18n="members_desc">Semua orang yang tergabung di KIR.</p>
      </div>
      <div class="hidden sm:flex items-center gap-2 text-xs">
        <span class="px-3 py-1 rounded-full badge-robotik">Robotik</span>
        <span class="px-3 py-1 rounded-full badge-sains">Sains</span>
      </div>
    </div>

    <div id="member-list" class="grid sm:grid-cols-2 gap-4"><!-- filled by script --></div>
  </main>
</div>

<script>
  const MEMBERS = [
    { name: 'Alex Pratama', role: 'Ketua Ekstrakurikuler', cabang: 'both' },
    { name: 'Priya Anand', role: 'Wakil Ketua', cabang: 'sains' },
    { name: 'Marcus Wijaya', role: 'Bendahara', cabang: 'robotik' },
    { name: 'Dinda Larasati', role: 'Anggota', cabang: 'sains' },
    { name: 'Reza Firmansyah', role: 'Anggota', cabang: 'robotik' },
    { name: 'Kayla Amelia', role: 'Anggota', cabang: 'both' },
  ];

  function cabangBadges(cabang) {
    if (cabang === 'both') {
      return `<span class="text-[11px] px-2.5 py-0.5 rounded-full badge-robotik">Robotik</span><span class="text-[11px] px-2.5 py-0.5 rounded-full badge-sains">Sains</span>`;
    }
    const cls = cabang === 'sains' ? 'badge-sains' : 'badge-robotik';
    const label = cabang === 'sains' ? 'Sains' : 'Robotik';
    return `<span class="text-[11px] px-2.5 py-0.5 rounded-full ${cls}">${label}</span>`;
  }

  function getRoleI18n(role) {
    const map = { 'Ketua Klub': 'role_ketua', 'Wakil Ketua': 'role_wakil', 'Bendahara': 'role_bendahara', 'Anggota': 'role_anggota' };
    return map[role] || 'role_anggota';
  }

  function renderMembers() {
    const you = kirCurrentUserName();
    const yourCabang = kirCurrentUserCabang();
    const all = [{ name: you, isYou: true, role: 'Anggota', cabang: yourCabang }, ...MEMBERS];

    const roleWeights = { 'Ketua Klub': 1, 'Wakil Ketua': 2, 'Sekretaris': 3, 'Bendahara': 4, 'Anggota': 5 };
    all.sort((a, b) => (roleWeights[a.role] || 6) - (roleWeights[b.role] || 6));

    document.getElementById('member-list').innerHTML = all.map(m => `
      <div class="glass rounded-xl p-5 flex items-center gap-4">
        <div class="w-11 h-11 rounded-full bg-accent-gradient flex items-center justify-center font-display font-semibold shrink-0">
          ${m.name.charAt(0).toUpperCase()}
        </div>
        <div class="min-w-0 flex-1">
          <p class="font-medium text-zinc-100 truncate">${m.name}${m.isYou ? ' <span data-i18n="you">(kamu)</span>' : ''}</p>
          <p class="text-zinc-500 text-xs mt-0.5" data-i18n="${getRoleI18n(m.role)}">${m.role}</p>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">${cabangBadges(m.cabang)}</div>
      </div>`).join('');
  }

  renderMembers();
  kirInjectSidebar('members');
</script>
</body>
</html>
