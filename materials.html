<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Materi</title>

<script src="js/auth.js"></script>
<script>kirRequireAuth();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>
<div class="glow-blob w-[400px] h-[400px] bg-accent-10 top-1/3 -right-32"></div>
<div class="glow-blob w-[350px] h-[350px] bg-accent-10 bottom-0 left-1/4"></div>

<div class="relative z-10 min-h-screen lg:flex">

  <div class="lg:hidden flex items-center justify-between px-4 py-3 glass border-x-0 border-t-0 sticky top-0 z-20">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-accent-gradient flex items-center justify-center font-display font-bold text-sm">K</div>
      <span class="font-display font-semibold">KIR</span>
    </a>
    <button onclick="document.getElementById('sidebar').classList.toggle('sidebar-collapsed')" class="text-zinc-300 p-2 -mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 collapse-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div id="sidebar-root"></div>

  <main class="flex-1 min-w-0 px-4 sm:px-8 py-8 max-w-6xl w-full mx-auto">
    <div class="mb-7">
      <h1 class="font-display text-2xl sm:text-3xl font-semibold tracking-tight" data-i18n="materials">Materials</h1>
      <p class="text-zinc-500 text-sm mt-1" data-i18n="materials_desc">Modul pembelajaran dan referensi untuk anggota klub.</p>
    </div>

    <div class="grid sm:grid-cols-2 gap-5">
      <div class="glass rounded-xl p-5 border border-accent-30 animate-stagger-in" style="animation-delay: 0ms">
        <h3 class="font-display font-semibold text-lg text-zinc-100 mb-2">Panduan Dasar C++</h3>
        <p class="text-zinc-400 text-sm mb-4">Materi pemrograman mikrokontroler untuk robotik dasar.</p>
        <button class="px-4 py-2 rounded-lg bg-white/10 text-sm font-medium hover:bg-white/20 transition">Unduh PDF</button>
      </div>
      <div class="glass rounded-xl p-5 border border-accent-30 animate-stagger-in" style="animation-delay: 45ms">
        <h3 class="font-display font-semibold text-lg text-zinc-100 mb-2">Metodologi Riset</h3>
        <p class="text-zinc-400 text-sm mb-4">Pengantar menyusun kerangka penelitian karya ilmiah.</p>
        <button class="px-4 py-2 rounded-lg bg-white/10 text-sm font-medium hover:bg-white/20 transition">Buka Tautan</button>
      </div>
    </div>

<script>
  kirInjectSidebar('materials');
