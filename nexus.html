<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script>kirRequireAuth();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/tailwind-config.js"></script>
<link rel="stylesheet" href="css/style.css">

<style>
  /* Same pan/zoom viewport treatment as members.html — kept as its
     own copy here (rather than sharing selectors) since Nexus will
     likely grow its own canvas content that isn't org-chart shaped. */
  #chart-viewport {
    cursor: grab;
    touch-action: none;
    user-select: none;
    background-image: radial-gradient(circle, rgba(148,163,184,0.16) 1px, transparent 1.5px);
    background-size: 26px 26px;
    background-position: 0px 0px;
  }
  #chart-viewport.dragging { cursor: grabbing; }

  [data-theme="light"] #chart-viewport {
    background-image: radial-gradient(circle, rgba(15,23,42,0.22) 1.3px, transparent 1.8px);
  }

  #chart-canvas {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .chart-ctrl-btn {
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 0.6rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: inherit;
  }
  .chart-ctrl-btn:hover { background: rgba(128,128,128,0.12); }
  .chart-ctrl-btn:active { transform: scale(0.94); }

  .chart-hint {
    pointer-events: none;
    user-select: none;
  }

  /* Fullscreen mode: viewport fills the screen, corners go square,
     canvas gets re-centered by chartResetView() on the resulting
     resize event (see initChartInteractions). */
  #chart-viewport:fullscreen,
  #chart-viewport:-webkit-full-screen {
    height: 100vh !important;
    width: 100vw !important;
    border-radius: 0;
  }
  #chart-viewport:fullscreen .chart-hint,
  #chart-viewport:-webkit-full-screen .chart-hint {
    bottom: 1rem;
    left: 1.25rem;
  }

  /* ---------- Nexus graph: nodes & connectors ---------- */
  #nexus-workspace {
    display: flex;
    align-items: stretch;
    gap: 1rem;
  }
  #chart-viewport {
    flex: 1 1 auto;
    min-width: 0;
  }

  #nexus-lines {
    position: absolute;
    top: 0;
    left: 0;
    overflow: visible;
    pointer-events: none;
  }
  .nexus-edge {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
  }
  /* Optional side branches (extra practice voyages, etc.) get a
     dashed, slightly softer line so they read as "not required" next
     to the solid main-progression curves. */
  .nexus-edge-branch {
    stroke-dasharray: 5 5;
    opacity: 0.8;
  }
  .nexus-edge-dot {
    fill: var(--bg-color, #0a0a0b);
    stroke-width: 2.5;
  }
  /* A connector that just became visible (its node just finished, or
     the far end just unlocked) draws itself in rather than appearing
     instantly. pathLength="1" on the <path> normalizes its length to
     1 unit so "1"/"0" dash values work regardless of the curve's
     actual pixel length. */
  .nexus-edge-animate {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: nexusEdgeDraw 0.75s ease forwards;
  }
  @keyframes nexusEdgeDraw {
    to { stroke-dashoffset: 0; }
  }
  .nexus-edge-dot-animate {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    animation: nexusDotPop 0.3s ease forwards;
    animation-delay: 0.6s;
  }
  @keyframes nexusDotPop {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 1; transform: scale(1); }
  }

  .nexus-node {
    position: absolute;
    width: 15rem;
  }
  .nexus-node-inner {
    background: rgba(24, 24, 27, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 1rem;
    cursor: pointer;
    position: relative;
    box-shadow: 0 14px 30px -14px rgba(0,0,0,0.6);
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  [data-theme="light"] .nexus-node-inner {
    background: rgba(255, 255, 255, 0.65);
  }
  .nexus-node-inner:hover {
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 16px 32px -10px rgba(0, 0, 0, 0.55);
  }
  .nexus-node.is-selected .nexus-node-inner {
    border-color: rgba(255, 255, 255, 0.32);
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1), 0 16px 32px -10px rgba(0, 0, 0, 0.6);
  }

  /* Title bar — a soft frosted strip, tinted by node type */
  .nexus-node-header {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.65rem;
    border-bottom: 1px solid var(--glass-border);
    border-radius: 1rem 1rem 0 0;
  }
  .nexus-node-header svg { width: 0.8rem; height: 0.8rem; flex-shrink: 0; }
  .nexus-node-icon-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.4rem;
    height: 1.4rem;
    border-radius: 0.4rem;
    flex-shrink: 0;
  }
  .nexus-node-icon-badge svg { width: 0.75rem !important; height: 0.75rem !important; }
  .nexus-node-header-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(212, 212, 216, 0.8);
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nexus-node-header-id {
    font-size: 9.5px;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .nexus-node-thumb {
    height: 4.5rem;
    background: rgba(128, 128, 128, 0.06);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--glass-border);
  }
  .nexus-node-thumb svg { width: 1.4rem; height: 1.4rem; opacity: 0.5; }
  .nexus-node-body { padding: 0.6rem 0.7rem 0.7rem; }
  .nexus-node-title {
    font-family: 'Inter', sans-serif;
  }
  .nexus-node-type svg { width: 0.85rem; height: 0.85rem; display: block; }
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ---------- Per-node-type card treatments ----------
     Each node type gets its own footer/CTA + a couple of layout
     tweaks, on top of the shared .nexus-node-inner shell. Colors
     stay inline (computed per-node in JS) since they can vary node
     to node (see material color progression), not just by type. */
  .nexus-node-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.55rem 0.7rem;
    border-top: 1px solid var(--glass-border);
  }
  .nexus-node-meta {
    font-size: 10.5px;
    font-weight: 500;
    color: rgba(148, 163, 184, 0.85);
    display: flex;
    align-items: center;
    gap: 0.3rem;
    min-width: 0;
    flex-shrink: 0;
  }
  .nexus-node-meta svg { width: 0.75rem; height: 0.75rem; flex-shrink: 0; }
  .nexus-node-action-btn {
    display: flex;
    align-items: center;
    gap: 0.32rem;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 0.4rem 0.65rem;
    border-radius: 0.5rem;
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: transform 0.12s ease, filter 0.12s ease;
  }
  .nexus-node-action-btn svg { width: 0.75rem; height: 0.75rem; flex-shrink: 0; }
  .nexus-node-action-btn:hover { filter: brightness(1.15); }
  .nexus-node-action-btn:active { transform: scale(0.95); }

  /* Course — the hub node. Bigger footprint, richer header/thumb,
     a stats row + overall progress bar instead of a single CTA. */
  .nexus-card-course .nexus-node-header { padding: 0.55rem 0.8rem; }
  .nexus-card-course .nexus-node-header svg { width: 1rem; height: 1rem; }
  .nexus-card-course .nexus-node-header-label { font-size: 10.5px; }
  .nexus-card-course .nexus-node-thumb { height: 6rem; }
  .nexus-card-course .nexus-node-thumb svg { width: 2.1rem; height: 2.1rem; }
  .nexus-card-course .nexus-node-body { padding-bottom: 0.4rem; }
  .nexus-card-course .nexus-node-title { font-size: 0.95rem; }
  .nexus-course-stats {
    display: flex;
    gap: 0.9rem;
    padding: 0 0.7rem 0.6rem;
  }
  .nexus-course-stat {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 10.5px;
    font-weight: 500;
    color: rgba(148, 163, 184, 0.9);
  }
  .nexus-course-stat svg { width: 0.8rem; height: 0.8rem; flex-shrink: 0; }
  .nexus-progress-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(128, 128, 128, 0.18);
    overflow: hidden;
    margin: 0 0.7rem 0.75rem;
  }
  .nexus-progress-fill {
    height: 100%;
    border-radius: 2px;
  }

  /* Course — hub node gets a circular icon medallion in its header
     (instead of a plain inline glyph) plus a heavier border, on top
     of its already-larger footprint/stats/progress bar, so it reads
     unmistakably as "the anchor" of the whole graph. */
  .nexus-card-course .nexus-node-inner { border-width: 1.5px; }
  .nexus-course-icon-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nexus-course-icon-badge svg { width: 0.9rem !important; height: 0.9rem !important; }

  /* Module — a chapter divider, not a piece of content: no thumb, no
     footer/CTA, just a numbered chip in a slim dashed-border strip so
     it visually reads as organizing structure rather than a lesson to
     open. Height/width fall out of its own content instead of
     matching the content-node shell. See nexusNodeCardHtml's
     module-specific branch for the markup this styles. */
  .nexus-card-module .nexus-node-inner { border-style: dashed; }
  .nexus-module-chip {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.75rem 0.85rem;
  }
  .nexus-module-number {
    font-size: 0.85rem;
    font-weight: 700;
    width: 1.9rem;
    height: 1.9rem;
    border-radius: 0.5rem;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 0.05rem;
  }
  .nexus-module-text { min-width: 0; flex: 1 1 auto; }
  .nexus-module-text .nexus-node-title { -webkit-line-clamp: unset; line-clamp: unset; display: block; overflow: visible; }

  /* Material — compact thumb, meta (duration) + "Buka Materi" CTA,
     plus a page/document motif: a colored spine along the card's
     left edge and a folded-corner triangle in the top-right of the
     thumbnail, evoking a printed page rather than a generic tile. */
  .nexus-card-material .nexus-node-thumb { height: 3.75rem; }
  .nexus-card-material .nexus-node-inner { border-left-width: 3px; }
  .nexus-material-foldcorner {
    position: absolute;
    top: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 1.1rem 1.1rem 0;
    border-color: transparent currentColor transparent transparent;
    opacity: 0.4;
  }

  /* Voyages — compact thumb, meta (question count) + "Mulai Voyage"
     CTA. Plain thumb, no extra motif needed — a voyage is just a set
     of questions, not a group activity. */
  .nexus-card-voyage .nexus-node-thumb { height: 3.75rem; }

  /* Flag — the final exam, a reskin of voyage group's footer, but
     with its own silhouette: a pennant notch clipped out of the
     bottom-right corner (like a torn flag edge) plus a thin
     checkered ribbon under the header, so it stands out as "the big
     one" rather than a routine voyage. */
  .nexus-card-flag .nexus-node-thumb { height: 3.75rem; }
  .nexus-card-flag .nexus-node-inner {
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
  }
  .nexus-flag-ribbon {
    height: 6px;
    background-image: repeating-linear-gradient(45deg, currentColor 0 6px, transparent 6px 12px);
    opacity: 0.45;
  }

  /* Connector ports — little pins poking out of the top/bottom edge,
     the same visual language as Unity's input/output sockets. */
  .nexus-port {
    position: absolute;
    left: 50%;
    width: 0.6rem;
    height: 0.6rem;
    margin-left: -0.3rem;
    border-radius: 50%;
    border: 2px solid var(--bg-color, #0a0a0b);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
    z-index: 2;
  }
  .nexus-port-in { top: -0.3rem; }
  .nexus-port-out { bottom: -0.3rem; }
  /* Side ports for branch connections (optional nodes hanging off to
     the left/right of their anchor) — same pin, just rotated onto the
     card's side edge instead of top/bottom. */
  .nexus-port-left { left: -0.3rem; top: 50%; margin-left: 0; margin-top: -0.3rem; }
  .nexus-port-right { left: auto; right: -0.3rem; top: 50%; margin-left: 0; margin-top: -0.3rem; }

  /* "Opsional" pill in the header of a branch node — dashed border to
     echo the dashed connector leading into it. */
  .nexus-node-optional-badge {
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.05rem 0.4rem;
    border-radius: 999px;
    border: 1px dashed;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ---------- Progress state: completed / current / locked ----------
     Every node carries a `state` (see applyNexusProgressState) driving
     one of these three looks. Completed/current stay fully visible —
     just a status pill in the header — since those are exactly what
     the person already has access to. Locked is the interesting one:
     rather than removing the card or graying text, a full blurred
     dark overlay sits over the whole card, hiding title/description/
     thumb/CTA completely while the card's shape, port, and position
     in the graph stay put — so the overall course structure still
     reads at a glance, just without spoiling what's in it. */
  .nexus-node-status-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.15rem;
    height: 1.15rem;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nexus-node-status-icon svg { width: 0.65rem; height: 0.65rem; display: block; }

  .nexus-node.is-current .nexus-node-inner {
    box-shadow: 0 0 0 2px var(--nexus-current-glow, rgba(255,255,255,0.4)), 0 16px 32px -10px rgba(0, 0, 0, 0.6);
  }

  .nexus-node.is-locked .nexus-node-inner { cursor: default; }
  .nexus-node.is-locked .nexus-node-inner:hover {
    border-color: var(--glass-border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 14px 26px -14px rgba(0,0,0,0.65);
  }
  .nexus-node-lock-overlay {
    position: absolute;
    inset: 0;
    z-index: 4;
    border-radius: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    background: rgba(6, 6, 8, 0.82);
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }
  [data-theme="light"] .nexus-node-lock-overlay { background: rgba(20, 20, 24, 0.72); }
  /* One-shot: plays once on the render where a node transitions out
     of locked, then the element is gone by the next render (a fresh
     card without this class). forwards keeps it invisible/inert at
     the end instead of snapping back to opaque after the keyframe. */
  .nexus-node-lock-overlay.nexus-lock-fading {
    animation: nexusLockFade 0.7s ease forwards;
    pointer-events: none;
  }
  @keyframes nexusLockFade {
    0% { opacity: 1; filter: blur(0); }
    100% { opacity: 0; filter: blur(3px); }
  }
  .nexus-node-lock-overlay svg { width: 1.15rem; height: 1.15rem; opacity: 0.55; color: #e5e7eb; }
  .nexus-node-lock-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(226, 232, 240, 0.7);
  }

  /* ---------- Inspector panel (NOT a modal — graph stays visible/interactive) ---------- */
  #nexus-inspector {
    flex: 0 0 0px;
    width: 0;
    opacity: 0;
    overflow: hidden;
    align-self: stretch;
    height: 75vh;
    min-height: 460px;
    transition: flex-basis 0.22s ease, width 0.22s ease, opacity 0.18s ease;
  }
  #nexus-inspector.open {
    flex: 0 0 21rem;
    width: 21rem;
    opacity: 1;
  }
  #nexus-inspector-body { width: 21rem; height: 100%; overflow-y: auto; }
  .nexus-inspector-thumb {
    height: 9rem;
    border-radius: 0.75rem;
    background: rgba(128, 128, 128, 0.08);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--glass-border);
  }
  .nexus-inspector-thumb svg { width: 2.25rem; height: 2.25rem; opacity: 0.5; }
  .nexus-relation-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0.6rem;
    border-radius: 0.6rem;
    border: 1px solid var(--glass-border);
    background: var(--glass-input-bg);
    cursor: pointer;
    text-align: left;
    width: 100%;
  }
  .nexus-relation-chip:hover { background: rgba(128,128,128,0.1); }

  @media (max-width: 1023px) {
    #nexus-workspace { position: relative; }
    #nexus-inspector {
      position: fixed;
      left: 0.75rem;
      right: 0.75rem;
      bottom: 0.75rem;
      width: auto;
      flex: none;
      height: auto;
      max-height: 65vh;
      min-height: 0;
      transform: translateY(calc(100% + 1rem));
      opacity: 1;
      z-index: 30;
      transition: transform 0.25s ease;
    }
    #nexus-inspector.open { transform: translateY(0); }
    #nexus-inspector-body { width: auto; }
  }
</style>
</head>

<body class="min-h-screen antialiased relative overflow-x-hidden">

<div class="glow-layer">
  <div class="glow-blob w-[500px] h-[500px] bg-accent-25 -top-40 -left-40"></div>
  <div class="glow-blob w-[400px] h-[400px] bg-accent-10 top-1/3 -right-32"></div>
  <div class="glow-blob w-[350px] h-[350px] bg-accent-10 bottom-0 left-1/4"></div>
</div>

<div class="relative z-10 min-h-screen lg:flex kir-app-shell">

  <div class="lg:hidden flex items-center justify-between px-4 py-3 glass border-x-0 border-t-0 sticky top-0 z-20">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 shrink-0 flex items-center justify-center">
        <img data-kir-brand-logo="glow" src="assets/kir_light_glow.PNG" alt="Orbit Logo" class="w-7 h-7 object-contain" />
      </div>
      <span class="font-display font-semibold tracking-wider text-gradient-accent">orbit.io</span>
    </a>
    <button onclick="kirToggleMobileSidebar()" class="text-zinc-300 p-2 -mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <div id="sidebar-root"></div>

  <main class="flex-1 min-w-0 px-4 sm:px-8 py-8 max-w-6xl w-full mx-auto">
    <div class="mb-7">
      <h1 class="font-display text-2xl sm:text-3xl font-semibold tracking-tight" data-i18n="nexus">Nexus</h1>
    </div>

    <!-- Pannable/zoomable canvas + side inspector -->
    <div id="nexus-workspace">
      <div id="chart-viewport" class="glass rounded-2xl relative overflow-hidden" style="height: 75vh; min-height: 460px;">

        <div class="absolute top-3 right-3 z-20 flex flex-col gap-1.5">
          <button onclick="chartZoom(1.15)" class="chart-ctrl-btn" title="Perbesar">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          </button>
          <button onclick="chartZoom(1/1.15)" class="chart-ctrl-btn" title="Perkecil">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h15" /></svg>
          </button>
          <button onclick="chartResetView()" class="chart-ctrl-btn" title="Reset tampilan">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114-5M20 15a8 8 0 01-14 5" /></svg>
          </button>
          <button onclick="chartToggleFullscreen()" class="chart-ctrl-btn" id="fullscreen-btn" title="Layar penuh">
            <svg id="fullscreen-icon-expand" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 3H5a2 2 0 00-2 2v4m18 0V5a2 2 0 00-2-2h-4m0 18h4a2 2 0 002-2v-4M3 15v4a2 2 0 002 2h4" /></svg>
            <svg id="fullscreen-icon-collapse" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 9H5m0 0V5m0 4l5-5m5 5h4m0 0V5m0 4l-5-5M9 15H5m0 0v4m0-4l5 5m5-5h4m0 0v4m0-4l-5 5" /></svg>
